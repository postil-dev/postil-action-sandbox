name: Postil Action smoke review

on:
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number to review
        required: true
        type: number

jobs:
  review:
    name: Review fixture
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run postil reviewer
        # Both repositories use immutable commits. cli-release must resolve to
        # cli-ref before the signed prebuilt binary is accepted.
        uses: postil-dev/postil-action@00442e2340edaa4a681955dbb25e20650ca1514c
        with:
          pr: ${{ inputs.pr }}
          cli-ref: fbbe0891bc302a7644c6fb2232ee5f4af587894b
          cli-release: v0.7.1
          api-key: ${{ secrets.OPENROUTER_API_KEY }}
