name: Postil Action smoke review

on:
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number to review
        required: true
        type: number

jobs:
  review:
    name: Review fixture
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run postil reviewer
        # Both repositories use immutable commits. cli-release must resolve to
        # cli-ref before the signed prebuilt binary is accepted.
        uses: postil-dev/postil-action@30e092854a34e84b57615720f4ac3611a49ea075
        with:
          pr: ${{ inputs.pr }}
          cli-ref: dcf4e34c4804d4bf64705ab6367c883cea23b33a
          cli-release: v0.7.2
          model: openai/gpt-5-mini
          api-key: ${{ secrets.OPENROUTER_API_KEY }}
